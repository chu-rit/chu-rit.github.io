<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>라벨메이커 - A4 시트</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --bg: #f3f4f6;
    --card: #ffffff;
    --border: #e5e7eb;
    --text: #1f2937;
    --text-muted: #6b7280;
    --label-w: 63.5mm;
    --label-h: 38.1mm;
    --label-gap-h: 2.5mm;
    --label-gap-v: 0mm;
    --margin-top: 12.7mm;
    --margin-left: 8.5mm;
  }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--primary);
  }

  header .actions { display: flex; gap: 8px; }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover { background: var(--primary-hover); }
  .btn-secondary { background: #e0e7ff; color: var(--primary); }
  .btn-secondary:hover { background: #c7d2fe; }
  .btn-outline { background: #fff; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--primary); color: var(--primary); }

  /* Main layout */
  .main { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  .sidebar {
    width: 300px;
    background: var(--card);
    border-right: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-bottom: 10px;
    margin-top: 18px;
  }
  .sidebar h2:first-child { margin-top: 0; }

  .field { margin-bottom: 12px; }

  .field label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 5px;
  }

  .field label .val { color: var(--text-muted); font-weight: 400; }

  .field input[type="text"],
  .field input[type="number"],
  .field select,
  .field textarea {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--primary);
  }
  .field textarea { resize: vertical; min-height: 50px; }

  .field input[type="range"] { width: 100%; accent-color: var(--primary); }

  .color-row { display: flex; align-items: center; gap: 8px; }
  .color-row input[type="color"] {
    width: 40px; height: 34px;
    border: 1px solid var(--border); border-radius: 6px;
    cursor: pointer; padding: 2px;
  }
  .color-row input[type="text"] { flex: 1; }

  .seg-group {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .seg-btn {
    flex: 1;
    padding: 7px 4px;
    border: none;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    transition: all 0.15s;
  }
  .seg-btn:hover { background: #f9fafb; }
  .seg-btn.active { background: var(--primary); color: #fff; }
  .seg-btn + .seg-btn { border-left: 1px solid var(--border); }

  .info-box {
    background: #f0f4ff;
    border: 1px solid #c7d2fe;
    border-radius: 8px;
    padding: 12px;
    font-size: 12px;
    line-height: 1.6;
    color: #3730a3;
    margin-bottom: 16px;
  }
  .info-box strong { display: block; margin-bottom: 4px; font-size: 13px; }

  /* Canvas area */
  .canvas-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    overflow-y: auto;
  }

  .sheet-wrapper {
    position: relative;
    margin: 0 auto 16px;
  }

  /* A4 sheet */
  .sheet {
    width: 210mm;
    height: 297mm;
    background: #fff;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    position: relative;
    transform-origin: top center;
  }

  .labels-grid {
    position: absolute;
    top: var(--margin-top);
    left: var(--margin-left);
    display: grid;
    grid-template-columns: repeat(3, var(--label-w));
    grid-template-rows: repeat(7, var(--label-h));
    column-gap: var(--label-gap-h);
    row-gap: var(--label-gap-v);
  }

  .label-cell {
    width: var(--label-w);
    height: var(--label-h);
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    word-break: break-word;
    cursor: pointer;
    position: relative;
    transition: outline 0.1s;
    outline: 1px solid #000;
    outline-offset: -1px;
    padding: 2mm;
    line-height: 1.2;
  }

  .label-cell:hover {
    outline: 2px solid var(--primary);
    outline-offset: -2px;
    z-index: 2;
  }

  .label-cell.selected {
    outline: 2px solid var(--primary);
    outline-offset: -2px;
    z-index: 3;
  }

  .label-cell .label-index {
    position: absolute;
    top: 1px;
    left: 3px;
    font-size: 8px;
    color: #cbd5e1;
    font-weight: 600;
    pointer-events: none;
  }

  .label-cell .label-text {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    word-break: break-word;
    white-space: pre-wrap;
    line-height: 1.2;
  }

  .label-cell .label-edit {
    width: 100%;
    height: 100%;
    border: none;
    outline: none;
    resize: none;
    text-align: inherit;
    font: inherit;
    color: inherit;
    background: rgba(0,0,0,0.03);
    padding: 1mm;
    line-height: 1.2;
    overflow: hidden;
  }

  .sheet-info {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 8px;
  }

  /* Sidebar toggle - hidden */
  .sidebar-toggle { display: none; }

  /* Mobile single label view (hidden on desktop) */
  .mobile-label-view {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    width: 100%;
    max-width: 400px;
  }
  .mobile-label-card {
    width: 100%;
    aspect-ratio: 63.5 / 38.1;
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 8px 12px;
    word-break: break-word;
    white-space: pre-wrap;
    line-height: 1.4;
    overflow: hidden;
  }
  .mobile-label-nav {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mobile-label-nav button {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--card);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.15s;
  }
  .mobile-label-nav button:hover { border-color: var(--primary); }
  .mobile-label-nav .nav-info {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    min-width: 60px;
    text-align: center;
  }

  @media (max-width: 900px) {
    body { display: block; min-height: auto; }
    .main { flex-direction: column; overflow: visible; flex: none; }

    /* Header - sticky on mobile */
    header {
      padding: 10px 14px;
      flex-wrap: wrap;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 20;
    }
    header h1 { font-size: 16px; }
    header .actions { gap: 6px; }
    .btn { padding: 7px 12px; font-size: 12px; }

    /* Canvas area - show first on mobile, sticky below header */
    .canvas-area {
      padding: 8px;
      order: 1;
      flex: 0 0 auto;
      min-height: auto;
      position: sticky;
      top: 52px;
      z-index: 9;
      background: var(--bg);
    }

    /* Hide A4 sheet on mobile, show single label view */
    .sheet-wrapper { display: none; }
    .sheet-info { display: none; }
    .mobile-label-view { display: flex !important; }
    #showIndexField, #showGuideField, #borderWidthField, #borderColorField, #zoomField { display: none; }

    /* Sidebar below preview */
    .sidebar {
      width: 100%;
      border-right: none;
      border-top: 1px solid var(--border);
      border-bottom: none;
      padding: 14px;
      order: 2;
      max-height: none;
      overflow-y: visible;
    }

    .sidebar h2 { font-size: 12px; margin-top: 14px; }
    .sidebar h2:first-child { margin-top: 0; }
    .info-box { font-size: 11px; padding: 10px; }
    .info-box strong { font-size: 12px; }

    .field { margin-bottom: 10px; }
    .field label { font-size: 12px; }
    .field input[type="text"],
    .field input[type="number"],
    .field select,
    .field textarea {
      padding: 9px 10px;
      font-size: 15px;
      min-height: 40px;
    }
    .field input[type="range"] { height: 36px; }

    .seg-btn { padding: 9px 4px; font-size: 12px; }

    .color-row input[type="color"] { width: 44px; height: 40px; }
  }

  @media (max-width: 500px) {
    header { padding: 8px 10px; }
    header h1 { font-size: 14px; }
    .btn { padding: 6px 10px; font-size: 11px; }

    .sidebar { padding: 12px; }
    .field input[type="text"],
    .field input[type="number"],
    .field select,
    .field textarea {
      font-size: 14px;
      padding: 10px;
    }
  }

  /* Print styles - placed after all media queries to ensure override */
  @media print {
    @page { size: A4; margin: 0; }
    body { background: #fff; }
    header, .sidebar, .mobile-label-view, .sheet-info { display: none !important; }
    .canvas-area { padding: 0; display: block; overflow: visible; }
    .sheet-wrapper { display: block !important; margin: 0; width: auto; height: auto; }
    .sheet {
      display: block !important;
      border: none;
      box-shadow: none;
      width: 210mm;
      height: 297mm;
      page-break-after: always;
      transform: none !important;
    }
    .labels-grid { display: grid !important; }
    .label-cell {
      outline: none !important;
      cursor: default;
    }
    .label-cell .label-index { display: none; }
  }

</style>
</head>
<body>

<header>
  <h1>🏷️ 라벨메이커</h1>
  <div class="actions">
    <button class="btn btn-outline" onclick="clearAll()">전체 삭제</button>
    <button class="btn btn-secondary" onclick="fillAll()">전체 채우기</button>
    <button class="btn btn-primary" onclick="window.print()">인쇄</button>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">

    <div class="info-box">
      <strong>📋 시트 규격 (A4)</strong>
      라벨: 63.5 × 38.1mm<br>
      여백: 상단 12.7mm / 좌측 8.5mm<br>
      간격: 가로 2.5mm / 세로 0mm<br>
      배치: 3열 × 7행 = 21개
    </div>

    <h2>편집 모드</h2>
    <div class="field">
      <div class="seg-group">
        <button class="seg-btn active" id="modeAll" onclick="setMode('all')">일괄 적용</button>
        <button class="seg-btn" id="modeSingle" onclick="setMode('single')">개별 편집</button>
      </div>
    </div>

    <div id="allModeFields">
      <div class="field">
        <label>모든 라벨에 적용할 텍스트</label>
        <textarea id="allText" rows="2" placeholder="모든 라벨에 같은 텍스트"></textarea>
      </div>
    </div>

    <div id="singleModeFields" style="display:none">
      <div class="field">
        <label>선택된 라벨 <span class="val" id="selectedInfo">없음</span></label>
        <textarea id="singleText" rows="2" placeholder="" disabled></textarea>
      </div>
    </div>

    <h2>폰트</h2>
    <div class="field">
      <label>글꼴</label>
      <select id="fontFamily">
        <option value="'Segoe UI', sans-serif">Segoe UI</option>
        <option value="Arial, sans-serif">Arial</option>
        <option value="'Helvetica Neue', sans-serif">Helvetica</option>
        <option value="Georgia, serif">Georgia</option>
        <option value="'Times New Roman', serif">Times New Roman</option>
        <option value="'Courier New', monospace">Courier New</option>
        <option value="Verdana, sans-serif">Verdana</option>
        <option value="'Trebuchet MS', sans-serif">Trebuchet MS</option>
        <option value="'Comic Sans MS', cursive">Comic Sans MS</option>
        <option value="Impact, sans-serif">Impact</option>
        <option value="'Palatino Linotype', serif">Palatino</option>
        <option value="Garamond, serif">Garamond</option>
        <option value="'Malgun Gothic', sans-serif">맑은 고딕</option>
        <option value="'Noto Sans KR', sans-serif">Noto Sans KR</option>
      </select>
    </div>

    <div class="field">
      <label>글자 크기 <span class="val" id="fontSizeVal">20pt</span></label>
      <input type="range" id="fontSize" min="6" max="40" value="20">
    </div>

    <div class="field">
      <label>글자 굵기</label>
      <select id="fontWeight">
        <option value="300">얇게 (300)</option>
        <option value="400" selected>보통 (400)</option>
        <option value="500">중간 (500)</option>
        <option value="600">약간 굵게 (600)</option>
        <option value="700">굵게 (700)</option>
        <option value="900">아주 굵게 (900)</option>
      </select>
    </div>

    <div class="field">
      <label>글자 색상</label>
      <div class="color-row">
        <input type="color" id="textColor" value="#1f2937">
        <input type="text" id="textColorHex" value="#1f2937">
      </div>
    </div>

    <div class="field">
      <label>줄간격 <span class="val" id="lineHeightVal">1.5</span></label>
      <input type="range" id="lineHeight" min="0.8" max="2.5" step="0.1" value="1.5">
    </div>

    <div class="field">
      <label>정렬</label>
      <div class="seg-group">
        <button class="seg-btn active" id="alignLeft" onclick="setAlign('left')">좌</button>
        <button class="seg-btn" id="alignCenter" onclick="setAlign('center')">중</button>
        <button class="seg-btn" id="alignRight" onclick="setAlign('right')">우</button>
      </div>
    </div>

    <h2>배경</h2>
    <div class="field">
      <label>배경 색상</label>
      <div class="color-row">
        <input type="color" id="bgColor" value="#ffffff">
        <input type="text" id="bgColorHex" value="#ffffff">
      </div>
    </div>

    <div class="field" id="borderWidthField">
      <label>테두리 두께 <span class="val" id="borderVal">0pt</span></label>
      <input type="range" id="borderWidth" min="0" max="3" step="0.5" value="0">
    </div>

    <div class="field" id="borderColorField">
      <label>테두리 색상</label>
      <div class="color-row">
        <input type="color" id="borderColor" value="#4f46e5">
        <input type="text" id="borderColorHex" value="#4f46e5">
      </div>
    </div>

    <div class="field" id="zoomField">
      <label>화면 배율 <span class="val" id="zoomVal">100%</span></label>
      <input type="range" id="zoom" min="30" max="150" value="100" step="10">
    </div>

    <div class="field" id="showIndexField">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="showIndex" checked style="width:auto"> 라벨 번호 표시
      </label>
    </div>

    <div class="field" id="showGuideField">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="showGuide" checked style="width:auto"> 가이드선 표시
      </label>
    </div>

  </div>

  <!-- Canvas -->
  <div class="canvas-area">
    <div class="sheet-info" id="sheetInfo">A4 (210×297mm) — 3열 × 7행 = 21개 라벨</div>
    <div class="sheet-wrapper" id="sheetWrapper">
      <div class="sheet" id="sheet">
        <div class="labels-grid" id="labelsGrid"></div>
      </div>
    </div>
    <!-- Mobile single label view -->
    <div class="mobile-label-view" id="mobileLabelView">
      <div class="mobile-label-card" id="mobileLabelCard" onclick="selectLabel(mobileIndex)"></div>
      <div class="mobile-label-nav">
        <button onclick="mobilePrev()">&#9664;</button>
        <span class="nav-info" id="mobileNavInfo">1 / 21</span>
        <button onclick="mobileNext()">&#9654;</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ── Config ──
  const COLS = 3;
  const ROWS = 7;
  const TOTAL = COLS * ROWS;

  // ── State ──
  let labels = new Array(TOTAL).fill('');
  let selectedIndex = -1;
  let mode = 'all'; // 'single' | 'all'
  let align = 'left';
  let showIndex = true;
  let showGuide = true;

  // ── Elements ──
  const grid = document.getElementById('labelsGrid');
  const els = {
    singleText:    document.getElementById('singleText'),
    allText:       document.getElementById('allText'),
    fontFamily:    document.getElementById('fontFamily'),
    fontSize:      document.getElementById('fontSize'),
    fontSizeVal:   document.getElementById('fontSizeVal'),
    fontWeight:    document.getElementById('fontWeight'),
    textColor:     document.getElementById('textColor'),
    textColorHex:  document.getElementById('textColorHex'),
    lineHeight:    document.getElementById('lineHeight'),
    lineHeightVal: document.getElementById('lineHeightVal'),
    bgColor:       document.getElementById('bgColor'),
    bgColorHex:    document.getElementById('bgColorHex'),
    borderWidth:   document.getElementById('borderWidth'),
    borderVal:     document.getElementById('borderVal'),
    borderColor:   document.getElementById('borderColor'),
    borderColorHex:document.getElementById('borderColorHex'),
    zoom:          document.getElementById('zoom'),
    zoomVal:       document.getElementById('zoomVal'),
    showIndex:     document.getElementById('showIndex'),
    showGuide:     document.getElementById('showGuide'),
    selectedInfo:  document.getElementById('selectedInfo'),
    sheet:         document.getElementById('sheet'),
    sheetWrapper:  document.getElementById('sheetWrapper'),
    singleModeFields:  document.getElementById('singleModeFields'),
    allModeFields:     document.getElementById('allModeFields'),
    mobileLabelView:   document.getElementById('mobileLabelView'),
    mobileLabelCard:   document.getElementById('mobileLabelCard'),
    mobileNavInfo:     document.getElementById('mobileNavInfo'),
  };

  // ── Build grid ──
  function buildGrid() {
    grid.innerHTML = '';
    for (let i = 0; i < TOTAL; i++) {
      const cell = document.createElement('div');
      cell.className = 'label-cell';
      cell.dataset.index = i;

      const indexLabel = document.createElement('span');
      indexLabel.className = 'label-index';
      indexLabel.textContent = (i + 1);
      cell.appendChild(indexLabel);

      const textDiv = document.createElement('div');
      textDiv.className = 'label-text';
      textDiv.textContent = labels[i] || '';
      cell.appendChild(textDiv);

      cell.addEventListener('click', () => selectLabel(i));
      grid.appendChild(cell);
    }
    updateMobileView();
    applyStyles();
  }

  // ── Mobile single label view ──
  let mobileIndex = 0;

  function updateMobileView() {
    const card = els.mobileLabelCard;
    const text = labels[mobileIndex] || '';
    card.textContent = text || '비어있음';
    card.style.color = text ? els.textColor.value : '#ccc';
    card.style.fontStyle = text ? 'normal' : 'italic';
    card.style.borderColor = selectedIndex === mobileIndex ? 'var(--primary)' : 'var(--border)';
    card.style.textAlign = align;
    card.style.justifyContent = align === 'left' ? 'flex-start' : (align === 'right' ? 'flex-end' : 'center');
    card.style.fontFamily = els.fontFamily.value;
    card.style.fontSize = els.fontSize.value + 'pt';
    card.style.fontWeight = els.fontWeight.value;
    card.style.lineHeight = els.lineHeight.value;
    card.style.backgroundColor = els.bgColor.value;
    const bw = els.borderWidth.value;
    card.style.border = bw !== '0' ? `${bw}pt solid ${els.borderColor.value}` : '2px solid var(--border)';
    els.mobileNavInfo.textContent = `${mobileIndex + 1} / ${TOTAL}`;
  }

  function mobilePrev() {
    mobileIndex = (mobileIndex - 1 + TOTAL) % TOTAL;
    if (mode === 'single') selectLabel(mobileIndex);
    else updateMobileView();
  }

  function mobileNext() {
    mobileIndex = (mobileIndex + 1) % TOTAL;
    if (mode === 'single') selectLabel(mobileIndex);
    else updateMobileView();
  }

  // ── Select label ──
  function selectLabel(i) {
    selectedIndex = i;
    mobileIndex = i;
    document.querySelectorAll('.label-cell').forEach((c, idx) => {
      c.classList.toggle('selected', idx === i);
    });
    updateMobileView();
    els.selectedInfo.textContent = `#${i + 1}`;
    els.singleText.disabled = false;
    els.singleText.value = labels[i] || '';
    els.singleText.focus();

    if (mode === 'all') {
      setMode('single');
    }
  }

  // ── Edit label text ──
  els.singleText.addEventListener('input', () => {
    if (selectedIndex >= 0) {
      labels[selectedIndex] = els.singleText.value;
      updateCellText(selectedIndex);
      updateMobileView();
    }
  });

  els.allText.addEventListener('input', () => {
    const text = els.allText.value;
    for (let i = 0; i < TOTAL; i++) {
      labels[i] = text;
      updateCellText(i);
      if (i === mobileIndex) updateMobileView();
    }
  });

  function updateCellText(i) {
    const cell = grid.children[i];
    if (!cell) return;
    const textDiv = cell.querySelector('.label-text');
    if (textDiv) textDiv.textContent = labels[i] || '';
  }

  // ── Mode toggle ──
  function setMode(m) {
    mode = m;
    els.singleModeFields.style.display = m === 'single' ? 'block' : 'none';
    els.allModeFields.style.display = m === 'all' ? 'block' : 'none';
    document.getElementById('modeSingle').classList.toggle('active', m === 'single');
    document.getElementById('modeAll').classList.toggle('active', m === 'all');
    if (m === 'single' && selectedIndex !== mobileIndex) {
      selectLabel(mobileIndex);
    }
  }

  // ── Alignment ──
  function setAlign(a) {
    align = a;
    document.getElementById('alignLeft').classList.toggle('active', a === 'left');
    document.getElementById('alignCenter').classList.toggle('active', a === 'center');
    document.getElementById('alignRight').classList.toggle('active', a === 'right');
    applyStyles();
  }

  // ── Apply styles to all labels ──
  function applyStyles() {
    const fontSize = els.fontSize.value + 'pt';
    const fontFamily = els.fontFamily.value;
    const fontWeight = els.fontWeight.value;
    const textColor = els.textColor.value;
    const bgColor = els.bgColor.value;
    const borderWidth = els.borderWidth.value + 'pt';
    const borderColor = els.borderColor.value;
    const lineHeight = els.lineHeight.value;

    document.querySelectorAll('.label-cell').forEach(cell => {
      cell.style.fontFamily = fontFamily;
      cell.style.fontSize = fontSize;
      cell.style.fontWeight = fontWeight;
      cell.style.color = textColor;
      cell.style.backgroundColor = bgColor;
      cell.style.lineHeight = lineHeight;
      cell.style.border = borderWidth !== '0pt' ? `${borderWidth} solid ${borderColor}` : 'none';
      const textEl = cell.querySelector('.label-text');
      if (textEl) {
        textEl.style.textAlign = align;
        textEl.style.justifyContent = align === 'left' ? 'flex-start' : (align === 'right' ? 'flex-end' : 'center');
        textEl.style.lineHeight = lineHeight;
      }

      const idx = cell.querySelector('.label-index');
      if (idx) idx.style.display = showIndex ? '' : 'none';

      // guide line
      cell.style.outline = showGuide ? '1px solid #000' : 'none';
    });

    updateMobileView();
  }

  // ── Zoom ──
  function applyZoom() {
    const z = parseInt(els.zoom.value);
    els.zoomVal.textContent = z + '%';
    els.sheet.style.transform = `scale(${z / 100})`;
    // Adjust wrapper height to account for scale
    const scale = z / 100;
    const sheetH = 297 * scale; // mm
    const sheetW = 210 * scale; // mm
    els.sheetWrapper.style.width = sheetW + 'mm';
    els.sheetWrapper.style.height = sheetH + 'mm';
  }

  // ── Clear all ──
  function clearAll() {
    if (!confirm('모든 라벨의 텍스트를 삭제하시겠습니까?')) return;
    labels = new Array(TOTAL).fill('');
    for (let i = 0; i < TOTAL; i++) updateCellText(i);
    updateMobileView();
    els.singleText.value = '';
    els.allText.value = '';
  }

  // ── Fill all ──
  function fillAll() {
    setMode('all');
    els.allText.focus();
  }

  // ── Color sync ──
  function syncColor(colorEl, hexEl) {
    colorEl.addEventListener('input', () => { hexEl.value = colorEl.value; applyStyles(); });
    hexEl.addEventListener('input', () => {
      const v = hexEl.value;
      if (/^#[0-9a-fA-F]{6}$/.test(v)) { colorEl.value = v; applyStyles(); }
    });
  }

  syncColor(els.textColor, els.textColorHex);
  syncColor(els.bgColor, els.bgColorHex);
  syncColor(els.borderColor, els.borderColorHex);

  // ── Listeners ──
  ['input','change'].forEach(ev => {
    els.fontFamily.addEventListener(ev, applyStyles);
    els.fontSize.addEventListener(ev, () => { els.fontSizeVal.textContent = els.fontSize.value + 'pt'; applyStyles(); });
    els.fontWeight.addEventListener(ev, applyStyles);
    els.lineHeight.addEventListener(ev, () => { els.lineHeightVal.textContent = els.lineHeight.value; applyStyles(); });
    els.borderWidth.addEventListener(ev, () => { els.borderVal.textContent = els.borderWidth.value + 'pt'; applyStyles(); });
    els.zoom.addEventListener(ev, applyZoom);
  });

  els.showIndex.addEventListener('change', () => { showIndex = els.showIndex.checked; applyStyles(); });
  els.showGuide.addEventListener('change', () => { showGuide = els.showGuide.checked; applyStyles(); });

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', (e) => {
    // Tab / Arrow keys to navigate between labels
    if (selectedIndex < 0) return;
    if (e.key === 'Tab') {
      e.preventDefault();
      const next = e.shiftKey ? (selectedIndex - 1 + TOTAL) % TOTAL : (selectedIndex + 1) % TOTAL;
      selectLabel(next);
    } else if (e.key === 'ArrowRight' && document.activeElement !== els.singleText && document.activeElement !== els.allText) {
      e.preventDefault();
      const col = selectedIndex % COLS;
      const row = Math.floor(selectedIndex / COLS);
      if (col < COLS - 1) selectLabel(selectedIndex + 1);
    } else if (e.key === 'ArrowLeft' && document.activeElement !== els.singleText && document.activeElement !== els.allText) {
      e.preventDefault();
      const col = selectedIndex % COLS;
      if (col > 0) selectLabel(selectedIndex - 1);
    } else if (e.key === 'ArrowDown' && document.activeElement !== els.singleText && document.activeElement !== els.allText) {
      e.preventDefault();
      const row = Math.floor(selectedIndex / COLS);
      if (row < ROWS - 1) selectLabel(selectedIndex + COLS);
    } else if (e.key === 'ArrowUp' && document.activeElement !== els.singleText && document.activeElement !== els.allText) {
      e.preventDefault();
      const row = Math.floor(selectedIndex / COLS);
      if (row > 0) selectLabel(selectedIndex - COLS);
    }
  });

  // ── Mobile auto-fit ──
  function autoFit() {
    if (window.innerWidth <= 900) return;
    const available = window.innerWidth - 348;
    const sheetWidthPx = 210 * 3.7795;
    const fitScale = Math.min(1, available / sheetWidthPx);
    const fitPercent = Math.round(fitScale * 100 / 5) * 5;
    els.zoom.value = Math.max(30, fitPercent);
    applyZoom();
  }

  // ── Init ──
  buildGrid();
  autoFit();

  window.addEventListener('resize', autoFit);

</script>

</body>
</html>
